<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Prática de Validação JS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Formulário de Cadastro</h1>
    <p>Preencha todos os campos e clique em Enviar.</p>
    <form id="formulario">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: Maria Silva">
        <span id="erro-nome"></span> <br><br>

        <label for="email">E-mail:</label>
        <input type="text" id="email" name="email" placeholder="Ex: maria@email.com">
        <span id="erro-email"></span> <br><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres"><br>
        <span id="erro-senha"></span> <br><br>

        <label for="confirma-senha">Confirmar senha:</label>
        <input type="password" id="confirma-senha" name="confirma-senha" placeholder="Repita a senha">
        <span id="erro-confirmasenha"></span> <br><br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Ex: 000.000.000-00" maxlength="14">
        <span id="erro-cpf"></span> <br><br>

        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" placeholder="Ex: (11) 99999-9999" maxlength="15">
        <span id="erro-telefone"></span> <br><br>
        
        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" placeholder="Ex: 01310-100" maxlength="9">
        <span id="erro-cep"></span> <br><br>

        <label for="data-nascimento">Data:</label>
        <input type="date" id="data-nascimento" name="data-nascimento" placeholder="Ex: 31/12/1990" maxlength="9">
        <span id="erro-data-nascimento"></span> <br><br>

        <label for="valor">Valor:</label>
        <input type="text" id="valor" name="valor" placeholder="Ex: 1.299,90">
        <span id="erro-valor"></span> <br><br>

        <label for="url">URL:</label>
        <input type="text" id="url" name="url" placeholder="Ex: https://meusite.com.br">
        <span id="erro-url"></span> <br><br>

        <label for="cartao">Número do cartão:</label>
        <input type="text" id="cartao" name="cartao" placeholder="Ex: 4111 1111 1111 1111" maxlength="19">
        <span id="erro-cartao"></span> <br><br>

        <button type="submit" onclick="validarFormulario(event)">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
    <hr>
    <div id="resultado">
        <h1>Cadastros</h1>
    </div>
</body>
<script src="script.js"></script>
</html>
